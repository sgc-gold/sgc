name: Tanaka Price Notify
on:
  repository_dispatch:
    types: [Check and Update Tanaka]
  workflow_dispatch:
    inputs:
      update_time:
        description: '930 または 1400'
        required: true
        default: '1400'
jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      # ── 1. リポジトリをチェックアウト ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # ── 2. Python セットアップ ─────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ── 3. Chrome + ChromeDriver インストール ──────────────
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
      # ── 4. Python ライブラリインストール ───────────────────
      - name: Install Python dependencies
        run: |
          pip install \
            selenium \
            webdriver-manager \
            pillow \
            requests \
            beautifulsoup4 \
            sendgrid
      # ── 5. update_time を環境変数に展開 ────────────────────
      #       repository_dispatch と workflow_dispatch の両方に対応
      - name: Set update_time env
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          # eventのJSONファイルから直接取得
          echo "=== event.json の内容 ==="
          cat "$GITHUB_EVENT_PATH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d.get('client_payload', {}), ensure_ascii=False))"
          TIME=$(cat "$GITHUB_EVENT_PATH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('client_payload', {}).get('update_time', ''))")
          echo "取得した TIME='$TIME'"
          echo "UPDATE_TIME=$TIME" >> $GITHUB_ENV
          echo "UPDATE_TIME に設定: $TIME"
      # ── 6. コメント取得（update_time で AM/PM 切り替え） ───
      - name: Fetch comment
        run: |
          if [ "$UPDATE_TIME" = "930" ]; then
            python scripts/comment.py
          elif [ "$UPDATE_TIME" = "1400" ]; then
            python scripts/comment_pm.py
          else
            echo "⚠ UPDATE_TIME が不明です: $UPDATE_TIME"
          fi
      # ── 6.5. txtファイルをリポジトリにコミット・プッシュ ──
      - name: Save txt files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f scripts/comment.txt scripts/comment_pm.txt 2>/dev/null || git add scripts/*.txt 2>/dev/null || echo "追加するtxtファイルなし"
          git diff --cached --quiet || git commit -m "Update txt files [skip ci]"
          git push
      # ── 7. チャート画像取得（BullionVault） ───────────────
      - name: Capture BullionVault charts
        run: python scripts/BullionVault.py
        env:
          UPDATE_TIME: ${{ env.UPDATE_TIME }}
      # ── 8. チャート画像取得（ドル円） ─────────────────────
      - name: Capture USDJPY chart
        run: python scripts/gaitame_usdjpy.py
      # ── 9. メール＋LINE WORKS 送信 ─────────────────────────
      - name: Send email and LINE WORKS
        run: python scripts/tanaka_test.py
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
