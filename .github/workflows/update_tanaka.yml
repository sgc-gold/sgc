name: Check and Update Tanaka
on:
  workflow_dispatch:
  repository_dispatch:
    types: [Check and Update Tanaka]

concurrency:
  group: tanaka-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Python をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 依存パッケージをインストール
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # update_tanaka.py を実行（GASが更新確認済みのためcheck不要）
      - name: Run update script
        env:
          UPDATE_TIME: ${{ github.event.client_payload.update_time }}
          PRICES_JSON: ${{ toJson(github.event.client_payload.tanaka_data) }}
        run: python scripts/update_tanaka.py

      # 変更があれば commit & push
      - name: Commit changes if any
        env:
          PAT_GITHUB: ${{ secrets.TANAKA_GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json data/history/*.json
          git diff --cached --quiet || (git commit -m "📈 Tanaka update at $(date '+%Y-%m-%d %H:%M JST')" && git push https://x-access-token:${PAT_GITHUB}@github.com/sgc-gold/sgc.git)

      # 通知ワークフローを起動（UPDATE_TIMEをGASから正しく引き継ぐ）
      - name: Trigger Tanaka Notify
        env:
          PAT_GITHUB: ${{ secrets.TANAKA_GITHUB_TOKEN }}
          UPDATE_TIME: ${{ github.event.client_payload.update_time }}
        run: |
          response_file="$(mktemp)"
          set +e
          http_code=$(curl --silent --show-error --fail-with-body --output "$response_file" --write-out "%{http_code}" -X POST \
            -H "Authorization: token $PAT_GITHUB" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sgc-gold/sgc/dispatches \
            -d "{\"event_type\":\"Check Tanaka Notify\",\"client_payload\":{\"update_time\":\"${UPDATE_TIME}\"}}")
          curl_status=$?
          set -e
          if [ "$curl_status" -ne 0 ] || [ "$http_code" != "204" ]; then
            echo "::error::Check Tanaka Notify dispatch failed with HTTP ${http_code}"
            cat "$response_file"
            exit 1
          fi
          rm -f "$response_file"
          echo "✅ Check Tanaka Notify を起動しました（UPDATE_TIME=${UPDATE_TIME}）"

      # deploy.yml を明示的に起動（PATでのpushはActionsをトリガーしないため）
      - name: Trigger Deploy
        env:
          PAT_GITHUB: ${{ secrets.TANAKA_GITHUB_TOKEN }}
        run: |
          response_file="$(mktemp)"
          set +e
          http_code=$(curl --silent --show-error --fail-with-body --output "$response_file" --write-out "%{http_code}" -X POST \
            -H "Authorization: token $PAT_GITHUB" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sgc-gold/sgc/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}')
          curl_status=$?
          set -e
          if [ "$curl_status" -ne 0 ] || [ "$http_code" != "204" ]; then
            echo "::error::deploy.yml dispatch failed with HTTP ${http_code}"
            cat "$response_file"
            exit 1
          fi
          rm -f "$response_file"
          echo "✅ deploy.yml を起動しました"
