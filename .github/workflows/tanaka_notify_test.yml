name: Tanaka Price Notify [TEST]

on:
  workflow_dispatch:          # GitHub画面から手動実行
    inputs:
      update_time:
        description: '更新時刻（930 = 09:30 / 1400 = 14:00）'
        required: true
        default: '930'
        type: choice
        options:
          - '930'
          - '1400'

jobs:
  notify_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          pip install \
            selenium \
            webdriver-manager \
            pillow \
            requests \
            beautifulsoup4 \
            sendgrid

      - name: Set update_time env
        run: |
          echo "UPDATE_TIME=${{ github.event.inputs.update_time }}" >> $GITHUB_ENV

      - name: Fetch comment
        run: |
          if [ "$UPDATE_TIME" = "930" ]; then
            python scripts/comment.py
          elif [ "$UPDATE_TIME" = "1400" ]; then
            python scripts/comment_pm.py
          fi

      - name: Capture BullionVault charts
        run: python scripts/BullionVault.py
        env:
          UPDATE_TIME: ${{ env.UPDATE_TIME }}

      - name: Capture USDJPY chart
        run: python scripts/gaitame_usdjpy.py

      # ★ テスト用：自分だけにメール送信・LINE WORKSはスキップ
      - name: Send email (TEST - to yokomori only)
        run: python scripts/tanaka_test.py
        env:
          SENDGRID_API_KEY:       ${{ secrets.SENDGRID_API_KEY }}
          LINEWORKS_WEBHOOK_URL:  ${{ secrets.LINEWORKS_WEBHOOK_URL }}
          UPDATE_TIME:            ${{ env.UPDATE_TIME }}
